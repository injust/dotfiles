# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Insert $fill and trailing space before $line_break
# Move less important modules to the right prompt
format = """\
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$fill \
$all\
$line_break\
$jobs\
$battery\
$time\
$status\
$os\
$container\
$shell\
$character\
"""

[fill]
symbol = '┬À'
style = '238'


