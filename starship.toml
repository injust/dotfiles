#:schema https://starship.rs/config-schema.json

# Insert $fill and trailing space before $line_break
# Move less important modules to the right prompt
format = """\
$username\
${env_var.SHPOOL_SESSION_NAME}\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hostname\
$fill \
$all\
$line_break\
$jobs\
$shlvl\
$character\
"""
palette = "catppuccin_mocha"

[battery]
disabled = true

[character]
format = "$symbol"  # Remove trailing space

[cmd_duration]
format = "took [’ēÆ $duration]($style) "  # Add hourglass symbol (https://github.com/starship/starship/issues/6826)

[env_var.SHPOOL_SESSION_NAME]
symbol = "Ņ»½ "
format = "[$symbol$env_value]($style) "
style = "bold sapphire"

[fill]
symbol = "┬Ę"
style = "237"

[jobs]
format = "[$symbol]($style)"  # Remove number and trailing space

[shlvl]
format = "[$symbol]($style)"  # Remove number and trailing space
symbol = "ŌØ»"
repeat = true
repeat_offset = 1
disabled = false

