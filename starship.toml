"$schema" = "https://starship.rs/config-schema.json"

# Insert $fill and trailing space before $line_break
# Move less important modules to the right prompt
format = """\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill \
$all\
$line_break\
$jobs\
$shlvl\
$character\
"""

[battery]
disabled = true

[character]
format = "$symbol" # Remove trailing space

[cmd_duration]
format = "took [´ëĺ $duration]($style) " # Add hourglass symbol (https://github.com/starship/starship/issues/6826)

[fill]
symbol = "┬Ě"
style = "237"

[jobs]
format = "[$symbol]($style)" # Remove number and trailing space

[shlvl]
format = "[$symbol]($style)" # Remove number and trailing space
symbol = "ÔŁ»"
repeat = true
repeat_offset = 1
disabled = false


